spring.application.name=api
server.port=8080

# Expose the Actuator health endpoint
management.endpoints.web.exposure.include=health

# These are the custom variables we injected into our Repositories using @Value!
# In production, Terraform will overwrite these automatically using environment variables.
app.aws.dynamodb.events-table=sports-tracker-dev-events
app.aws.dynamodb.summaries-table=sports-tracker-dev-summaries

# CORS: comma-separated origins (overridden in ECS via environment variable)
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080,https://dev.gameshift.live

# OAuth2 Resource Server: Cognito JWT issuer URI (overridden in ECS via environment variable)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${COGNITO_ISSUER_URI:https://cognito-idp.us-east-1.amazonaws.com/us-east-1_du9IVom4k}

# Producer service base URL (overridden in ECS via environment variable)
app.producer.base-url=${PRODUCER_BASE_URL:http://localhost:8081}

# Mock mode: when true, fixture endpoints return simulated data instead of querying DynamoDB
app.mock-mode=${MOCK_MODE:true}

# Turn down noisy AWS SDK logs
logging.level.software.amazon.awssdk=WARN
logging.level.org.springframework.security=WARN
