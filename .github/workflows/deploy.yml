name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: maven

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        run: echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build and push producer
        uses: docker/build-push-action@v6
        with:
          context: ./producer
          file: ./docker/producer.Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/sports-tracker-${{ github.event.inputs.environment || 'dev' }}-producer:latest
            ${{ steps.ecr-login.outputs.registry }}/sports-tracker-${{ github.event.inputs.environment || 'dev' }}-producer:${{ env.IMAGE_TAG }}

      - name: Build and push api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/api.Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/sports-tracker-${{ github.event.inputs.environment || 'dev' }}-api:latest
            ${{ steps.ecr-login.outputs.registry }}/sports-tracker-${{ github.event.inputs.environment || 'dev' }}-api:${{ env.IMAGE_TAG }}

      - name: Fetch Frontend Environment Variables
        id: frontend-env
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          USER_POOL_ID=$(aws cognito-idp list-user-pools --max-results 10 --query "UserPools[?Name=='sports-tracker-${ENV}-user-pool'].Id" --output text)
          CLIENT_ID=$(aws cognito-idp list-user-pool-clients --user-pool-id $USER_POOL_ID --query "UserPoolClients[0].ClientId" --output text)
          DOMAIN_PREFIX=$(aws cognito-idp describe-user-pool --user-pool-id $USER_POOL_ID --query "UserPool.Domain" --output text)
          
          if [ "$ENV" == "prod" ]; then
            APP_URL="https://www.gameshift.live"
          else
            APP_URL="https://${ENV}.gameshift.live"
          fi
          
          echo "COGNITO_CLIENT_ID=$CLIENT_ID" >> $GITHUB_ENV
          echo "COGNITO_DOMAIN=https://${DOMAIN_PREFIX}.auth.us-east-1.amazoncognito.com" >> $GITHUB_ENV
          echo "APP_URL=$APP_URL" >> $GITHUB_ENV

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./docker/frontend.Dockerfile
          push: true
          provenance: false
          build-args: |
            NEXT_PUBLIC_COGNITO_CLIENT_ID=${{ env.COGNITO_CLIENT_ID }}
            NEXT_PUBLIC_COGNITO_DOMAIN=${{ env.COGNITO_DOMAIN }}
            NEXT_PUBLIC_APP_URL=${{ env.APP_URL }}
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/sports-tracker-${{ github.event.inputs.environment || 'dev' }}-frontend:latest
            ${{ steps.ecr-login.outputs.registry }}/sports-tracker-${{ github.event.inputs.environment || 'dev' }}-frontend:${{ env.IMAGE_TAG }}

      - name: Build Lambda
        run: |
          ./mvnw clean package -pl lambda -am

      - name: Deploy to ECS and Lambda
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          
          # Update Lambda function
          aws lambda update-function-code \
            --function-name "sports-tracker-${ENV}-processor" \
            --zip-file fileb://lambda/target/lambda-0.0.1-SNAPSHOT.jar > /dev/null

          # Update ECS services
          aws ecs update-service \
            --cluster "sports-tracker-${ENV}-cluster" \
            --service "sports-tracker-${ENV}-producer" \
            --force-new-deployment > /dev/null
            
          aws ecs update-service \
            --cluster "sports-tracker-${ENV}-cluster" \
            --service "sports-tracker-${ENV}-api" \
            --force-new-deployment > /dev/null
            
          aws ecs update-service \
            --cluster "sports-tracker-${ENV}-cluster" \
            --service "sports-tracker-${ENV}-frontend" \
            --force-new-deployment > /dev/null
